# SECURITY: This workflow uses pull_request_target so that Dependabot PRs
# (which can't access secrets under `pull_request`) can still clean up Neon
# preview branches. This is safe because:
#   1. NO step checks out or executes code from the PR
#   2. The fork guard (head.repo == repository) skips fork PRs entirely
#   3. github.head_ref is passed via env var (not inline in run:), preventing injection
#   4. neonctl is version-pinned (prefer npx pin over the official action,
#      which uses a floating @v2 tag and inlines inputs into shell commands)
# If you modify this workflow, NEVER add actions/checkout with the PR's ref.

name: Cleanup Neon preview branch
on:
  pull_request_target:
    branches:
      - main
    types: [closed]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  delete-branch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Delete Neon preview branch
        continue-on-error: true
        run: npx neonctl@2.22.0 branches delete "$BRANCH_NAME" --project-id "$PROJECT_ID"
        env:
          BRANCH_NAME: preview/${{ github.head_ref }}
          PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
