# SECURITY: This workflow uses pull_request_target to get write permissions
# needed for auto-approving and auto-merging Dependabot PRs. This is safe
# because NO step checks out or executes code from the PR. If you modify
# this workflow, NEVER add actions/checkout with the PR's ref — doing so
# would allow arbitrary code execution with write permissions.
#
# NOTE: `gh pr merge --auto` queues the merge but respects branch protection.
# The CI workflow ("Lint, Type Check, Test & Build") MUST be configured as a
# required status check on `main` — otherwise PRs can merge without validation.
# Production dependencies (next, react, etc.) are excluded from auto-merge by
# the `direct:development` guard in the condition below.
#
# NOTE: A fine-grained PAT (DEPENDABOT_MERGE_PAT) is used instead of
# GITHUB_TOKEN so that the merge event is attributed to a real user. This
# ensures the pull_request_target:closed event fires and triggers the Neon
# branch cleanup workflow. GITHUB_TOKEN-initiated merges suppress downstream
# workflow triggers (GitHub security rule).
#
# Required PAT scopes (fine-grained, scoped to this repository only):
#   - Contents: Read and write (for merge)
#   - Pull requests: Read and write (for approve + merge)

name: Auto-merge Dependabot

on:
  pull_request_target:
    branches:
      - main

permissions: {}

jobs:
  auto-merge:
    name: Auto-merge
    permissions:
      contents: write
      pull-requests: write
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
      - name: Approve PR
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          (steps.metadata.outputs.update-type == 'version-update:semver-minor' && steps.metadata.outputs.dependency-type == 'direct:development')
        run: gh pr review --approve "$PR_URL"
        env:
          # PR_URL is set via env (not inline in run:) to prevent shell injection
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.DEPENDABOT_MERGE_PAT }}
      - name: Enable auto-merge
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          (steps.metadata.outputs.update-type == 'version-update:semver-minor' && steps.metadata.outputs.dependency-type == 'direct:development')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          # PR_URL is set via env (not inline in run:) to prevent shell injection
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.DEPENDABOT_MERGE_PAT }}
