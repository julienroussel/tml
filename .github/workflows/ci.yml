name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Cache Next.js build
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test:coverage -- --reporter=default --reporter=github-actions

      - name: Upload coverage
        if: '!cancelled()'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: i18n completeness check
        run: pnpm i18n:check

      - name: Check generated docs staleness
        run: |
          pnpm docs:generate
          git diff --exit-code public/llms.txt public/llms-full.txt docs/diagrams/

      - name: Build
        run: pnpm build
        env:
          NEON_AUTH_BASE_URL: http://localhost:4000
          NEON_AUTH_COOKIE_SECRET: ci-dummy-secret-that-is-at-least-32-characters-long
          EMAIL_HMAC_SECRET: ci-dummy-hmac-secret-at-least-32-characters-long
          DATABASE_URL: postgresql://unused:unused@localhost:5432/unused

  e2e:
    name: E2E Smoke Tests
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # TODO: Remove continue-on-error after E2E stability is confirmed
    continue-on-error: true
    # Dummy values — only needed so the dev server starts; not used for real auth
    env:
      NEON_AUTH_BASE_URL: http://localhost:4000
      DATABASE_URL: postgresql://unused:unused@localhost:5432/unused
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate E2E secrets
        id: e2e-secret
        run: |
          echo "cookie=$(openssl rand -base64 32)" >> "$GITHUB_OUTPUT"
          echo "hmac=$(openssl rand -base64 32)" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm exec playwright --version)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          NEON_AUTH_COOKIE_SECRET: ${{ steps.e2e-secret.outputs.cookie }}
          EMAIL_HMAC_SECRET: ${{ steps.e2e-secret.outputs.hmac }}

      - name: Upload test report
        if: '!cancelled()'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
