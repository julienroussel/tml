name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm

      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test:coverage -- --reporter=default --reporter=github-actions

      - name: Upload coverage
        if: '!cancelled()'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: i18n completeness check
        run: pnpm i18n:check

      - name: Sync artifacts staleness check
        run: pnpm sync:check

      - name: Check migration drift
        if: github.event_name == 'push' || github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          pnpm db:generate
          git diff --exit-code src/db/migrations/
        env:
          DATABASE_URL: postgresql://unused:unused@localhost:5432/unused

      - name: Check generated docs staleness
        if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          pnpm docs:generate
          git diff --exit-code public/llms.txt public/llms-full.txt docs/diagrams/

      - name: Build
        run: pnpm build
        env:
          NEON_AUTH_BASE_URL: http://localhost:4000
          NEON_AUTH_COOKIE_SECRET: ci-dummy-secret-that-is-at-least-32-characters-long
          EMAIL_HMAC_SECRET: ci-dummy-hmac-secret-at-least-32-characters-long
          DATABASE_URL: postgresql://unused:unused@localhost:5432/unused

      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm exec playwright --version)" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run PWA E2E tests
        run: pnpm exec playwright test --project=pwa
        env:
          PLAYWRIGHT_SKIP_BUILD: "1"
          NEON_AUTH_BASE_URL: http://localhost:4000
          NEON_AUTH_COOKIE_SECRET: ci-dummy-secret-that-is-at-least-32-characters-long
          EMAIL_HMAC_SECRET: ci-dummy-hmac-secret-at-least-32-characters-long
          DATABASE_URL: postgresql://unused:unused@localhost:5432/unused

      - name: Upload PWA test report
        if: '!cancelled()'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pwa-playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 30
