version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'Europe/Paris'
    labels:
      - 'dependencies'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Europe/Paris'
    open-pull-requests-limit: 5
    target-branch: 'main'
    labels:
      - 'dependencies'
    groups:
      # -- Auto-merge tier (order matters: first match wins) --
      patch-updates:
        update-types:
          - patch
      dev-minor-updates:
        dependency-type: development
        update-types:
          - minor

      # -- Manual review tier (only production minors reach these) --
      next:
        patterns:
          - 'next'
          - '@next/*'
      react:
        patterns:
          - '@types/react'
          - '@types/react-dom'
          - 'react'
          - 'react-dom'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
          - 'tw-animate-css'
      shadcn:
        patterns:
          - 'shadcn'
          - 'radix-ui'
          - '@radix-ui/*'
    ignore:
      - dependency-name: 'next'
        update-types: ['version-update:semver-major']
      - dependency-name: '@next/*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
